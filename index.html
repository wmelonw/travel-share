<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>여행 패키지 카톡 공유</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 16px;
    font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
    background: #f5f5f7; color: #1c1c1e;
    -webkit-text-size-adjust: 100%;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #000; color: #f2f2f7; }
    textarea { background: #1c1c1e; color: #f2f2f7; border-color: #38383a; }
    .hint { color: #98989d; }
    img.preview { border-color: #38383a; }
  }
  h1 { font-size: 18px; margin: 4px 0 12px; }
  img.preview {
    width: 100%; border: 1px solid #d1d1d6; border-radius: 12px;
    margin-bottom: 12px; background: #fff;
  }
  textarea {
    width: 100%; min-height: 34vh; padding: 12px;
    font-size: 14px; line-height: 1.5; border: 1px solid #d1d1d6; border-radius: 12px;
    background: #fff; color: #1c1c1e; resize: vertical; white-space: pre-wrap;
  }
  button {
    width: 100%; padding: 16px; margin-top: 12px;
    font-size: 17px; font-weight: 600; border: none; border-radius: 14px;
    color: #fff; background: #fae100; color: #3c1e1e; cursor: pointer;
  }
  button:disabled { opacity: .4; cursor: default; }
  button.text { background: #fae100; color: #3c1e1e; }
  button.copy { background: #007aff; color: #fff; }
  .hint { font-size: 13px; color: #6e6e73; margin-top: 10px; line-height: 1.5; }
  .err { color: #ff3b30; }
</style>
</head>
<body>
  <h1>✈️ 여행 패키지 — 카톡으로 공유</h1>
  <img id="preview" class="preview" alt="비교표 미리보기" style="display:none">
  <textarea id="out" readonly aria-label="공유 텍스트"></textarea>
  <button id="shareImg">📷 비교표 이미지 공유</button>
  <button id="shareText" class="text">📝 본문(링크) 공유</button>
  <button id="copy" class="copy">📋 본문 복사</button>
  <p class="hint" id="hint">
    카톡은 이미지·글을 <b>한 번에</b> 못 받아요 → 버튼을 <b>따로</b> 눌러주세요.<br>
    각 버튼 → 앱 선택 창 → <b>카카오톡</b> → 받는 사람. 이미지·본문을 각각 한 번씩 보내면 됩니다.
  </p>

<script>
  // ---- base64url(UTF-8) 디코드 ----
  function b64urlDecode(s) {
    s = s.replace(/-/g, "+").replace(/_/g, "/");
    while (s.length % 4) s += "=";
    const bin = atob(s);
    const bytes = Uint8Array.from(bin, (c) => c.charCodeAt(0));
    return new TextDecoder("utf-8").decode(bytes);
  }

  // ---- 마크다운 링크 [명칭](url) -> "명칭\nurl" 생링크 변환 ----
  function toBareLinks(md) {
    return md.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (_, label, url) => {
      return label + "\n" + url;
    });
  }

  const out = document.getElementById("out");
  const hint = document.getElementById("hint");
  const previewEl = document.getElementById("preview");
  const shareImgBtn = document.getElementById("shareImg");
  const shareTextBtn = document.getElementById("shareText");
  let text = "";
  let imgUrl = "";

  // 이미지 URL -> File (same-origin이라 CORS 안전)
  async function fetchImageFile() {
    if (!imgUrl) return null;
    try {
      const res = await fetch(imgUrl, { cache: "no-store" });
      if (!res.ok) return null;
      const blob = await res.blob();
      return new File([blob], "여행패키지_비교표.png", { type: blob.type || "image/png" });
    } catch (_) {
      return null;
    }
  }

  // ---- 공유 데이터 적재: ?d=<id> 면 s/<id>.json fetch (짧은 URL), 없으면 레거시 #해시 ----
  (async function init() {
    try {
      const d = new URLSearchParams(location.search).get("d");
      let md = "", img = "";
      if (d) {
        const res = await fetch("s/" + encodeURIComponent(d) + ".json", { cache: "no-store" });
        if (!res.ok) throw new Error("공유 데이터를 불러오지 못했습니다. 텔레그램에서 다시 열어주세요.");
        const payload = await res.json();
        md = payload.t || "";
        img = payload.img || "";
      } else if (location.hash.slice(1)) {           // 레거시 해시 페이로드 호환
        const payload = JSON.parse(b64urlDecode(location.hash.slice(1)));
        md = payload.t || "";
        img = payload.img || "";
      } else {
        throw new Error("공유할 내용이 없습니다. 텔레그램의 '카톡 공유' 버튼으로 다시 열어주세요.");
      }
      imgUrl = img;
      text = toBareLinks(md);
      out.value = text;
      if (imgUrl) {
        previewEl.src = imgUrl;
        previewEl.style.display = "block";
      }
    } catch (e) {
      out.value = "";
      hint.innerHTML = '<span class="err">⚠️ ' + (e && e.message ? e.message : e) + "</span>";
    }
    // 이미지 없으면 이미지 버튼 숨김
    if (!imgUrl) shareImgBtn.style.display = "none";
    // 공유 미지원 브라우저면 공유 버튼 비활성(복사만)
    if (!navigator.share) {
      shareImgBtn.disabled = true;
      shareTextBtn.disabled = true;
      hint.innerHTML = '이 브라우저는 공유를 지원하지 않습니다. <b>복사</b> 버튼을 쓰세요.';
    }
  })();

  // ① 이미지만 공유 (text 안 넣음 → 카톡이 이미지 깔끔히 수신)
  shareImgBtn.addEventListener("click", async () => {
    if (!navigator.share) return;
    const file = await fetchImageFile();
    if (!file) {
      hint.innerHTML = '<span class="err">이미지를 불러오지 못했습니다. 위 미리보기를 길게 눌러 저장·전송하세요.</span>';
      return;
    }
    if (navigator.canShare && !navigator.canShare({ files: [file] })) {
      hint.innerHTML = "ℹ️ 이 기기는 이미지 공유를 지원하지 않습니다. 위 미리보기를 길게 눌러 저장·전송하세요.";
      return;
    }
    try {
      await navigator.share({ files: [file] });
      hint.innerHTML = "✅ 이미지 공유함. 이제 <b>📝 본문(링크) 공유</b>도 눌러 보내세요.";
    } catch (e) {
      if (e && e.name !== "AbortError")
        hint.innerHTML = '<span class="err">이미지 공유 실패: ' + e.message + "</span>";
    }
  });

  // ② 본문(링크)만 공유 (text only → 카톡이 글·링크 수신)
  shareTextBtn.addEventListener("click", async () => {
    if (!navigator.share || !text) return;
    try {
      await navigator.share({ text });
      hint.innerHTML = "✅ 본문 공유함. 이미지도 보내려면 <b>📷 비교표 이미지 공유</b>를 누르세요.";
    } catch (e) {
      if (e && e.name !== "AbortError")
        hint.innerHTML = '<span class="err">본문 공유 실패: ' + e.message + " — \'복사\'를 쓰세요.</span>";
    }
  });

  document.getElementById("copy").addEventListener("click", async () => {
    if (!text) return;
    try {
      await navigator.clipboard.writeText(text);
      hint.innerHTML = "✅ 복사됐습니다. 카카오톡에 붙여넣기 하세요.";
    } catch (e) {
      out.select();
      document.execCommand("copy");
      hint.innerHTML = "✅ 복사됐습니다 (수동). 카카오톡에 붙여넣기 하세요.";
    }
  });
</script>
</body>
</html>
